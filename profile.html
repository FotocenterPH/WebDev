<div class="profile-page">
    <div class="profile-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <h2>FOTOCENTER › My Profile</h2>
        <button id="logoutFromProfile" class="logout-text">Log out</button>
    </div>

    <div class="profile-tabs" role="tablist" aria-label="Profile sections" style="margin-bottom:1rem;">
        <button class="profile-tab active" data-tab="profileTab" role="tab" aria-selected="true">Profile</button>
    </div>

    <div class="profile-main">
        <aside class="profile-left">
            <div class="profile-card">
                <div class="avatar-wrap">
                    <div class="avatar-inner">
                        <img id="profileAvatar" src="" alt="">
                    </div>
                    <input type="file" id="avatarUploadInput" accept="image/*" class="avatar-input" hidden>
                </div>
                <div style="display:flex;justify-content:center;margin-top:0.75rem;">
                    <button id="uploadAvatarBtn" class="btn primary" type="button">✏️ Upload Avatar</button>
                </div>
            </div>
        </aside>

        <section class="profile-right">
            <div class="profile-right-container">

                <!-- PROFILE TAB -->
                <div id="profileTab" class="tab-panel active" aria-hidden="false">
                    <div class="personal-header" style="display:flex; align-items:center; justify-content:space-between; gap:1rem;">
                        <h3 style="margin:0;">Personal Info</h3>
                    <div class="personal-actions" style="display:flex; gap:0.5rem;">
                            <!-- Profile edit: click Edit to modify fields -->
                            <button id="editProfileBtn" class="btn primary">Edit Info</button>
                            <button id="saveProfileBtn" class="btn primary save-btn hidden">Save</button>
                            <button id="cancelProfileBtn" class="btn cancel-btn hidden">Cancel</button>
                        </div>
                    </div>

                    <form id="profileForm" class="profile-form personal-panel" style="margin-top:1rem; gap:0.75rem;">
                        <div class="info-stack">
                            <div class="info-row">
                                <div class="info-label">Customer's Name</div>
                                <div class="info-value" id="spanProfileName"></div>
                                <input id="inputProfileName" name="name" type="text" class="hidden edit-input">
                            </div>
                            <div class="info-row">
                                <div class="info-label">Contact Number</div>
                                <div class="info-value" id="spanProfilePhone"></div>
                                <input id="inputProfilePhone" name="phone" type="tel" class="hidden edit-input">
                            </div>
                            <div class="info-row">
                                <div class="info-label">Email Address</div>
                                <div class="info-value" id="spanProfileEmail"></div>
                                <input id="inputProfileEmail" name="email" type="email" class="hidden edit-input">
                            </div>
                        </div>
                        <div class="member-box muted">Member since: <span id="profileMemberSince">N/A</span></div>
                    </form>
                    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
                        <button id="saveProfileBtn" class="btn primary hidden">Save</button>
                        <button id="cancelProfileBtn" class="btn cancel-btn hidden">Cancel</button>
                    </div>

                    <h4 style="margin-top:1.25rem">Addresses</h4>
                    <div class="addresses-list addresses-box" id="addressesList">
                        <div class="muted">Loading addresses...</div>
                    </div>
                    <div id="addressFormContainer"></div>
                    <div style="margin-top:0.5rem;"><button id="addAddressBtn" class="btn primary">➕ Add New Address</button></div>
                </div>

                <!-- ORDERS tab removed -->

                <!-- SETTINGS tab removed -->
            </div>
        </section>
    </div>
</div>
